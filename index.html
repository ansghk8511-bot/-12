<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #joystick { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid white; }
        #fireBtn { position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; background: rgba(255,0,0,0.5); border-radius: 50%; border: 2px solid white; color: white; line-height: 100px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div id="joystick"></div>
<div id="fireBtn">FIRE</div>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let isGameStarted = false, isGameOver = false, isGameCleared = false, deathMessage = "";
    let nextBossScore = 100000;
    const bullets = [], enemies = [], keys = { up: false, down: false, left: false, right: false };
    let score = 0;
    const player = { x: 0, y: 0, size: 64, frame: 0, dir: 1 };

    // 조이스틱 조작
    const js = document.getElementById('joystick');
    js.addEventListener('touchmove', (e) => {
        let touch = e.touches[0];
        let rect = js.getBoundingClientRect();
        let dx = touch.clientX - (rect.left + 60);
        let dy = touch.clientY - (rect.top + 60);
        keys.left = dx < -20; keys.right = dx > 20;
        keys.up = dy < -20; keys.down = dy > 20;
    });
    js.addEventListener('touchend', () => { keys.left=keys.right=keys.up=keys.down = false; });

    // 사격 버튼
    document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
        if (isGameStarted && !isGameOver) {
            const stats = getWeaponStats();
            // 사격 방향은 플레이어가 바라보는 방향으로 자동 발사
            bullets.push({ x: player.x, y: player.y, dx: player.dir * stats.speed, dy: 0, pierce: stats.pierce, size: stats.size, color: stats.color, damage: stats.damage });
        } else if(!isGameStarted) { isGameStarted = true; spawnEnemy(); }
    });

    function getWeaponStats() {
        let level = Math.min(Math.floor(score / 5000) + 1, 30);
        const colors = ['white', 'cyan', 'lime', 'yellow', 'orange', 'red', 'magenta', 'gold'];
        return { speed: 15, pierce: level >= 5, size: 15, color: colors[Math.min(Math.floor(level/4), 7)], damage: 1 + Math.floor(level/2) };
    }

    function spawnEnemy() {
        if (!isGameOver && !isGameCleared && isGameStarted) {
            if (score >= nextBossScore) {
                enemies.push({ x: player.x + 800, y: player.y, frame: 0, type: 3, hp: 2000, maxHp: 2000 });
                nextBossScore += 100000;
            }
            let angle = Math.random() * Math.PI * 2;
            enemies.push({ x: player.x + Math.cos(angle) * 800, y: player.y + Math.sin(angle) * 800, frame: 0, type: Math.random() > 0.7 ? 2 : 1 });
            setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 1000)));
        }
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isGameStarted || isGameOver || isGameCleared) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '30px Arial';
            ctx.fillText(isGameCleared ? "클리어!" : (isGameOver ? "GAME OVER" : "TOUCH JOYSTICK TO START"), canvas.width/2, canvas.height/2);
        } else {
            if (score >= 1000000) isGameCleared = true;
            let camX = player.x - canvas.width/2; let camY = player.y - canvas.height/2;

            if (keys.left) { player.x -= 5; player.dir = -1; }
            if (keys.right) { player.x += 5; player.dir = 1; }
            if (keys.up) player.y -= 5;
            if (keys.down) player.y += 5;

            ctx.fillStyle = 'blue'; ctx.fillRect(canvas.width/2 - 32, canvas.height/2 - 32, 64, 64);

            enemies.forEach((e, ei) => {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * 1.5; e.y += Math.sin(angle) * 1.5;
                ctx.fillStyle = e.type === 3 ? 'red' : 'green';
                ctx.fillRect(e.x - camX - 32, e.y - camY - 32, 64, 64);
                if (Math.hypot(player.x - e.x, player.y - e.y) < 40) isGameOver = true;
            });

            bullets.forEach((b, bi) => {
                b.x += b.dx; b.y += b.dy;
                ctx.fillStyle = b.color; ctx.fillRect(b.x - camX, b.y - camY, 10, 10);
            });
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
