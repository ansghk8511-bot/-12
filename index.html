<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .btn { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 10px; border: 2px solid white; color: white; text-align: center; line-height: 80px; font-weight: bold; z-index: 10; }
        #up { bottom: 170px; left: 100px; }
        #down { bottom: 10px; left: 100px; }
        #left { bottom: 90px; left: 20px; }
        #right { bottom: 90px; left: 180px; }
        #fireBtn { position: absolute; bottom: 90px; right: 60px; width: 120px; height: 120px; background: rgba(255,0,0,0.5); border-radius: 50%; border: 2px solid white; color: white; line-height: 120px; text-align: center; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <div id="up" class="btn">▲</div>
    <div id="down" class="btn">▼</div>
    <div id="left" class="btn">◀</div>
    <div id="right" class="btn">▶</div>
    <div id="fireBtn">FIRE</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()];
    playerWalks[0].src = 'player_walk_1.png'; playerWalks[1].src = 'player_walk_2.png'; playerWalks[2].src = 'player_walk_3.png';
    const enemy1Walks = [new Image(), new Image(), new Image()];
    enemy1Walks[0].src = 'enemy1_1.png'; enemy1Walks[1].src = 'enemy1_2.png'; enemy1Walks[2].src = 'enemy1_3.png';
    const enemy2Walks = [new Image(), new Image(), new Image()];
    enemy2Walks[0].src = 'enemy2_1.png'; enemy2Walks[1].src = 'enemy2_2.png'; enemy2Walks[2].src = 'enemy2_3.png';
    const bossWalks = [new Image(), new Image(), new Image()];
    bossWalks[0].src = 'boss_1.png'; bossWalks[1].src = 'boss_2.png'; bossWalks[2].src = 'boss_3.png';

    let isGameStarted = false, isGameOver = false, isGameCleared = false;
    let nextBossScore = 100000, score = 0;
    const bullets = [], enemies = [], keys = { up: false, down: false, left: false, right: false };
    const player = { x: 0, y: 0, frame: 0, dir: 1, isMoving: false };

    function setBtnEvents(id, key) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', () => keys[key] = true);
        el.addEventListener('touchend', () => keys[key] = false);
    }
    setBtnEvents('up', 'up'); setBtnEvents('down', 'down');
    setBtnEvents('left', 'left'); setBtnEvents('right', 'right');

    document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
        if (!isGameStarted) { isGameStarted = true; spawnEnemy(); }
        else if (!isGameOver) {
            bullets.push({ x: player.x, y: player.y, dx: player.dir * 15, dy: 0, size: 15, color: 'yellow' });
        }
    });

    function spawnEnemy() {
        if (!isGameOver && !isGameCleared && isGameStarted) {
            if (score >= nextBossScore) {
                enemies.push({ x: player.x + 800, y: player.y, frame: 0, type: 3, hp: 2000, maxHp: 2000 });
                nextBossScore += 100000;
            }
            let angle = Math.random() * Math.PI * 2;
            enemies.push({ x: player.x + Math.cos(angle) * 800, y: player.y + Math.sin(angle) * 800, frame: 0, type: Math.random() > 0.7 ? 2 : 1 });
            setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 1000)));
        }
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isGameStarted || isGameOver || isGameCleared) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.font = '40px Arial';
            ctx.fillText(isGameCleared ? "게임 클리어!" : "쫜득이를 물리쳐라! (두쫜득)", canvas.width/2, canvas.height/2 - 40);
            ctx.font = '20px Arial';
            ctx.fillText("터치하여 시작", canvas.width/2, canvas.height/2 + 20);
        } else {
            let camX = player.x - canvas.width/2, camY = player.y - canvas.height/2;
            player.isMoving = (keys.left || keys.right || keys.up || keys.down);
            if (keys.left) { player.x -= 5; player.dir = -1; }
            if (keys.right) { player.x += 5; player.dir = 1; }
            if (keys.up) player.y -= 5;
            if (keys.down) player.y += 5;

            player.frame += 0.1;
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            if (player.dir === -1) ctx.scale(-1, 1);
            ctx.drawImage(player.isMoving ? playerWalks[Math.floor(player.frame) % 3] : playerIdle, -32, -32, 64, 64);
            ctx.restore();

            enemies.forEach(e => {
                e.frame += 0.08;
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * 1.2; e.y += Math.sin(angle) * 1.2;
                let img = (e.type === 3) ? bossWalks[Math.floor(e.frame)%3] : (e.type === 2 ? enemy2Walks[Math.floor(e.frame)%3] : enemy1Walks[Math.floor(e.frame)%3]);
                ctx.drawImage(img, e.x - camX - 32, e.y - camY - 32, 64, 64);
            });
            bullets.forEach(b => {
                b.x += b.dx; b.y += b.dy;
                ctx.fillStyle = b.color; ctx.fillRect(b.x - camX, b.y - camY, b.size, b.size);
            });
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
