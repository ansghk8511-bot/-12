<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .btn { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 10px; border: 2px solid white; color: white; text-align: center; line-height: 60px; font-weight: bold; z-index: 10; font-size: 18px; user-select: none; }
        #up { bottom: 150px; left: 100px; } #down { bottom: 10px; left: 100px; }
        #left { bottom: 80px; left: 30px; } #right { bottom: 80px; left: 170px; }
        #upLeft { bottom: 150px; left: 30px; } #upRight { bottom: 150px; left: 170px; }
        #downLeft { bottom: 10px; left: 30px; } #downRight { bottom: 10px; left: 170px; }
        #fireBtn { position: absolute; bottom: 80px; right: 60px; width: 100px; height: 100px; background: rgba(255,0,0,0.6); border-radius: 50%; border: 2px solid white; color: white; line-height: 100px; text-align: center; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>
    <div id="up" class="btn">▲</div> <div id="down" class="btn">▼</div>
    <div id="left" class="btn">◀</div> <div id="right" class="btn">▶</div>
    <div id="upLeft" class="btn">↖</div> <div id="upRight" class="btn">↗</div>
    <div id="downLeft" class="btn">↙</div> <div id="downRight" class="btn">↘</div>
    <div id="fireBtn">FIRE</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // 이미지 로드
    const playerIdle = new Image(); playerIdle.src = 'player_idle.png';
    const playerWalks = [new Image(), new Image(), new Image()];
    playerWalks[0].src = 'player_walk_1.png'; playerWalks[1].src = 'player_walk_2.png'; playerWalks[2].src = 'player_walk_3.png';
    const enemy1Walks = [new Image(), new Image(), new Image()];
    enemy1Walks[0].src = 'enemy1_1.png'; enemy1Walks[1].src = 'enemy1_2.png'; enemy1Walks[2].src = 'enemy1_3.png';
    const enemy2Walks = [new Image(), new Image(), new Image()];
    enemy2Walks[0].src = 'enemy2_1.png'; enemy2Walks[1].src = 'enemy2_2.png'; enemy2Walks[2].src = 'enemy2_3.png';
    const bossWalks = [new Image(), new Image(), new Image()];
    bossWalks[0].src = 'boss_1.png'; bossWalks[1].src = 'boss_2.png'; bossWalks[2].src = 'boss_3.png';

    let isGameStarted = false, isGameOver = false, isGameCleared = false;
    let nextBossScore = 100000, score = 0;
    const bullets = [], enemies = [], keys = { up: false, down: false, left: false, right: false };
    const player = { x: 0, y: 0, frame: 0, dirX: 1, dirY: 0, isMoving: false };

    function setBtnEvents(id, dU, dD, dL, dR) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); if(dU) keys.up=true; if(dD) keys.down=true; if(dL) keys.left=true; if(dR) keys.right=true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys.up=keys.down=keys.left=keys.right=false; });
    }
    setBtnEvents('up', 1,0,0,0); setBtnEvents('down', 0,1,0,0); setBtnEvents('left', 0,0,1,0); setBtnEvents('right', 0,0,0,1);
    setBtnEvents('upLeft', 1,0,1,0); setBtnEvents('upRight', 1,0,0,1); setBtnEvents('downLeft', 0,1,1,0); setBtnEvents('downRight', 0,1,0,1);

    document.getElementById('fireBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isGameStarted) { isGameStarted = true; spawnEnemy(); }
        else if (!isGameOver) { bullets.push({ x: player.x, y: player.y, dx: player.dirX * 15, dy: player.dirY * 15, size: 15, color: 'yellow' }); }
    });

    function spawnEnemy() {
        if (!isGameOver && !isGameStarted) return;
        if (score >= nextBossScore) {
            enemies.push({ x: player.x + 800, y: player.y, type: 3, hp: 2000, maxHp: 2000, frame: 0 });
            nextBossScore += 100000;
        }
        let angle = Math.random() * Math.PI * 2;
        enemies.push({ x: player.x + Math.cos(angle) * 800, y: player.y + Math.sin(angle) * 800, type: Math.random() > 0.7 ? 2 : 1, frame: 0 });
        setTimeout(spawnEnemy, Math.max(300, 2000 - (score / 1000)));
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isGameStarted || isGameOver) {
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.font = '30px Arial'; ctx.fillText(isGameOver ? "GAME OVER" : "쫜득이를 물리쳐라! (두쫜득)", canvas.width/2, canvas.height/2);
        } else {
            let dx = (keys.right - keys.left), dy = (keys.down - keys.up);
            let mag = Math.sqrt(dx * dx + dy * dy);
            if (mag > 0) { player.x += (dx / mag) * 5; player.y += (dy / mag) * 5; player.dirX = dx/mag; player.dirY = dy/mag; player.isMoving = true; }
            else { player.isMoving = false; }

            let camX = player.x - canvas.width/2, camY = player.y - canvas.height/2;
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            if (player.dirX < 0) ctx.scale(-1, 1);
            ctx.drawImage(player.isMoving ? playerWalks[Math.floor(player.frame += 0.1) % 3] : playerIdle, -32, -32, 64, 64);
            ctx.restore();

            enemies.forEach((e, i) => {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * 1.2; e.y += Math.sin(angle) * 1.2;
                e.frame += 0.08;
                if (Math.hypot(player.x - e.x, player.y - e.y) < 40) isGameOver = true;
                let img = (e.type === 3) ? bossWalks[Math.floor(e.frame)%3] : (e.type === 2 ? enemy2Walks[Math.floor(e.frame)%3] : enemy1Walks[Math.floor(e.frame)%3]);
                ctx.drawImage(img, e.x - camX - 32, e.y - camY - 32, 64, 64);
                bullets.forEach((b, bi) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 30) { enemies.splice(i, 1); bullets.splice(bi, 1); score += 500; }
                });
            });
            bullets.forEach(b => { b.x += b.dx; b.y += b.dy; ctx.fillStyle = 'yellow'; ctx.fillRect(b.x - camX, b.y - camY, 10, 10); });
            ctx.fillStyle = 'white'; ctx.fillText("Score: " + score, 100, 50);
        }
        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
